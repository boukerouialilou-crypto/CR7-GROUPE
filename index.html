<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Maison Secrète</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            user-select: none;
        }

        /* Écran d'accueil / Interface de départ */
        #menu-ecran {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2c3e50, #000000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
        }

        #menu-ecran h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            letter-spacing: 5px;
            color: #ff3333;
            text-shadow: 0 0 10px rgba(255,0,0,0.7);
            animation: pulsations 2s infinite;
        }

        #bouton-jouer {
            padding: 15px 40px;
            font-size: 1.5rem;
            background-color: #ff3333;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
        }

        #bouton-jouer:hover {
            background-color: #ff6666;
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.8);
        }

        /* Zone de Mission en haut */
        #mission-barre {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #ff3333;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            z-index: 5;
            display: none;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Message d'état (Victoire / Défaite) */
        #overlay-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            z-index: 8;
            display: none;
            text-shadow: 2px 2px 10px #000;
        }

        /* Contrôles tactiles / mobiles au cas où */
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            z-index: 5;
            display: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }

        @keyframes pulsations {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
    <!-- Importation de la bibliothèque 3D Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- INTERFACE 1 : LA MAISON SECRETE -->
    <div id="menu-ecran">
        <h1>LA MAISON SECRÈTE</h1>
        <p style="font-size: 1.2rem; margin-bottom: 30px; color: #ccc;">Un jeu d'exploration et de survie en 3D</p>
        <button id="bouton-jouer">COMMENCER L'AVENTURE</button>
    </div>

    <!-- ZONE DES MISSIONS EN HAUT -->
    <div id="mission-barre" id="mission">MISSION : REJOINDRE LA MAISON DANS LA FORÊT</div>

    <!-- MESSAGES SPÉCIAUX -->
    <div id="overlay-message"></div>

    <!-- INSTRUCTIONS -->
    <div id="instructions">
        Déplacement : Z, Q, S, D ou FLÈCHES<br>
        Caméra : Bouge la souris pour regarder autour
    </div>

    <script>
        // --- CONFIGURATION DU JEU ---
        let scene, camera, renderer;
        let etape = "foret"; // foret -> maison -> fin
        let touches = {};
        let joueur = { x: 0, z: 20, rotation: 0, vitesse: 0.15 };
        
        // Objets 3D importants
        let maison, porte, cle, maisonInterieur;
        let arbres = [];
        let pieges = [];
        let systemeParticules;

        const missionBarre = document.getElementById("mission-barre");
        const overlayMessage = document.getElementById("overlay-message");

        // --- EVENEMENTS ---
        document.getElementById("bouton-jouer").addEventListener("click", () => {
            document.getElementById("menu-ecran").style.display = "none";
            missionBarre.style.display = "block";
            document.getElementById("instructions").style.display = "block";
            
            // Activer le verrouillage du pointeur pour une caméra de style FPS
            document.body.requestPointerLock();
            
            init();
            animate();
        });

        // Gestion du clavier
        window.addEventListener('keydown', (e) => { touches[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { touches[e.key.toLowerCase()] = false; });
        
        // Rotation avec la souris
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                joueur.rotation -= e.movementX * 0.003;
            }
        });

        // --- INITIALISATION DU MONDE 3D ---
        function init() {
            // Création de la scène
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0f0a); // Ambiance sombre de forêt
            scene.fog = new THREE.FogExp2(0x0a0f0a, 0.07);

            // Caméra
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 20); // Hauteur des yeux humaine

            // Rendu
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lumières
            const lumiereAmbiante = new THREE.AmbientLight(0x111122, 1.5);
            scene.add(lumiereAmbiante);

            const lune = new THREE.DirectionalLight(0x5555ff, 0.8);
            lune.position.set(10, 20, 10);
            scene.add(lune);

            creerSol();
            creerForet();
            creerMaisonStructure();
        }

        // --- CRÉATION DU SOL ---
        function creerSol() {
            const geometrieSol = new THREE.PlaneGeometry(100, 100);
            const materiauSol = new THREE.MeshStandardMaterial({ color: 0x1b2c12, roughness: 0.9 });
            const sol = new THREE.Mesh(geometrieSol, materiauSol);
            sol.rotation.x = -Math.PI / 2;
            scene.add(sol);
        }

        // --- CRÉATION DE LA FORÊT ---
        function creerForet() {
            // Créer des arbres simples (tronc brun + feuillage vert) de chaque côté du chemin
            for (let i = 0; i < 60; i++) {
                const groupeArbre = new THREE.Group();

                // Tronc
                const geoTronc = new THREE.CylinderGeometry(0.2, 0.3, 3, 8);
                const matTronc = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
                const tronc = new THREE.Mesh(geoTronc, matTronc);
                tronc.position.y = 1.5;
                groupeArbre.add(tronc);

                // Feuillage
                const geoFeuilles = new THREE.ConeGeometry(1.2, 3, 8);
                const matFeuilles = new THREE.MeshStandardMaterial({ color: 0x0f3614 });
                const feuilles = new THREE.Mesh(geoFeuilles, matFeuilles);
                feuilles.position.y = 3.5;
                groupeArbre.add(feuilles);

                // Positionnement aléatoire pour faire une allée
                let x = (Math.random() - 0.5) * 60;
                let z = (Math.random() - 0.5) * 40 - 10;
                
                // On s'assure de laisser le chemin libre au milieu pour marcher en ligne droite
                if (Math.abs(x) < 4) {
                    x += x > 0 ? 4 : -4; 
                }

                groupeArbre.position.set(x, 0, z);
                scene.add(groupeArbre);
            }
        }

        // --- CRÉATION DE LA MAISON ---
        function creerMaisonStructure() {
            maison = new THREE.Group();
            maison.position.set(0, 0, -15); // Située au bout du chemin tout droit

            // Les Murs extérieurs (Boite grise mystérieuse)
            const geoMurs = new THREE.BoxGeometry(10, 5, 10);
            const matMurs = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.8 });
            const murs = new THREE.Mesh(geoMurs, matMurs);
            murs.position.y = 2.5;
            maison.add(murs);

            // Le Toit
            const geoToit = new THREE.ConeGeometry(8, 3, 4);
            const matToit = new THREE.MeshStandardMaterial({ color: 0x8b0000 });
            const toit = new THREE.Mesh(geoToit, matToit);
            toit.position.y = 6.5;
            toit.rotation.y = Math.PI / 4;
            maison.add(toit);

            // La Porte
            const geoPorte = new THREE.BoxGeometry(2, 3.2, 0.2);
            const matPorte = new THREE.MeshStandardMaterial({ color: 0x4a2e00 });
            porte = new THREE.Mesh(geoPorte, matPorte);
            porte.position.set(0, 1.6, 5.01); // Juste devant le mur de devant
            maison.add(porte);

            // Lumière intérieure mystérieuse
            const lumiereInterieure = new THREE.PointLight(0xffaa44, 2, 8);
            lumiereInterieure.position.set(0, 2.5, 0);
            maison.add(lumiereInterieure);

            scene.add(maison);
        }

        // --- PRÉPARER L'INTÉRIEUR (UNE FOIS QU'ON EST ENTRÉ) ---
        function genererInterieurMaison() {
            // On supprime la forêt pour l'ambiance et optimiser
            scene.fog.color.setHex(0x050505);
            scene.background.setHex(0x050505);

            // Bloquer la porte (on ne peut plus sortir !)
            porte.position.z = 4.9; // Rentre dans le mur, symboliquement verrouillée.
            
            // Ajouter des pièges (Cylindres rouges qui montent et descendent)
            for (let i = 0; i < 4; i++) {
                const geoPiege = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 16);
                const matPiege = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 });
                const piege = new THREE.Mesh(geoPiege, matPiege);
                
                // Disposer les pièges dans la maison
                piege.position.set((Math.random() - 0.5) * 6, 0.1, -15 + (Math.random() - 0.5) * 6);
                piege.vitesseY = 0.05 + Math.random() * 0.05;
                piege.direction = 1;
                
                scene.add(piege);
                pieges.push(piege);
            }

            // Ajouter la Clé dorée tout au fond
            const geoCle = new THREE.TorusGeometry(0.3, 0.1, 8, 24);
            const matCle = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
            cle = new THREE.Mesh(geoCle, matCle);
            cle.position.set(0, 1, -18);
            scene.add(cle);
        }

        // --- BOUCLE DE MISE À JOUR (ANIMATION) ---
        function animate() {
            requestAnimationFrame(animate);

            // Déplacements du joueur
            let deplacementX = 0;
            let deplacementZ = 0;

            if (touches['z'] || touches['arrowup']) {
                deplacementX += -Math.sin(joueur.rotation) * joueur.vitesse;
                deplacementZ += -Math.cos(joueur.rotation) * joueur.vitesse;
            }
            if (touches['s'] || touches['arrowdown']) {
                deplacementX += Math.sin(joueur.rotation) * joueur.vitesse;
                deplacementZ += Math.cos(joueur.rotation) * joueur.vitesse;
            }
            if (touches['q'] || touches['arrowleft']) {
                deplacementX += -Math.cos(joueur.rotation) * joueur.vitesse;
                deplacementZ += Math.sin(joueur.rotation) * joueur.vitesse;
            }
            if (touches['d'] || touches['arrowright']) {
                deplacementX += Math.cos(joueur.rotation) * joueur.vitesse;
                deplacementZ += -Math.sin(joueur.rotation) * joueur.vitesse;
            }

            // Appliquer le mouvement
            joueur.x += deplacementX;
            joueur.z += deplacementZ;

            // Phase 1 : Dehors dans la forêt
            if (etape === "foret") {
                // Limiter le joueur à rester dans l'allée (marcher droit)
                if (joueur.x > 3.5) joueur.x = 3.5;
                if (joueur.x < -3.5) joueur.x = -3.5;

                // Si on s'approche de la porte de la maison
                let distanceMaison = Math.sqrt(Math.pow(joueur.x, 2) + Math.pow(joueur.z - (-10), 2));
                if (distanceMaison < 1.5) {
                    etape = "maison";
                    missionBarre.innerHTML = "MISSION : EXPLORER LA MAISON, ÉVITER LES PIÈGES ET TROUVER LA CLÉ";
                    missionBarre.style.borderColor = "#ffcc00";
                    genererInterieurMaison();
                }
            }

            // Phase 2 : Dans la maison secrète
            if (etape === "maison") {
                // Collisions avec les murs de la maison (dimensions : 10x10 autour de x=0, z=-15)
                if (joueur.x > 4.2) joueur.x = 4.2;
                if (joueur.x < -4.2) joueur.x = -4.2;
                if (joueur.z > -10.5) joueur.z = -10.5; // Impossible de ressortir !
                if (joueur.z < -19.2) joueur.z = -19.2;

                // Animer les pièges (pics qui montent et descendent)
                pieges.forEach(piege => {
                    piege.position.y += piege.vitesseY * piege.direction;
                    if (piege.position.y > 1.8 || piege.position.y < 0.1) {
                        piege.direction *= -1;
                    }

                    // Collision avec les pièges
                    let distPiege = Math.sqrt(Math.pow(joueur.x - piege.position.x, 2) + Math.pow(joueur.z - piege.position.z, 2));
                    if (distPiege < 0.8 && piege.position.y > 0.3) {
                        // On touche le piège ! Réinitialisation de la position dans la maison
                        joueur.x = 0;
                        joueur.z = -11.5;
                        flashRouge();
                    }
                });

                // Tourner la clé sur elle-même
                if (cle) {
                    cle.rotation.y += 0.05;
                    cle.rotation.x += 0.02;

                    // Prendre la clé (Victoire !)
                    let distCle = Math.sqrt(Math.pow(joueur.x - cle.position.x, 2) + Math.pow(joueur.z - cle.position.z, 2));
                    if (distCle < 1.0) {
                        etape = "fin";
                        missionBarre.innerHTML = "JEU TERMINÉ : VOUS VOUS ÊTES ÉCHAPPÉ !";
                        missionBarre.style.borderColor = "#00ff00";
                        overlayMessage.style.display = "block";
                        overlayMessage.innerHTML = "VICTOIRE ! 🎉<br><span style='font-size:1.5rem; color:#ffd700;'>Tu as trouvé la clé de la Maison Secrète !</span>";
                        scene.remove(cle);
                    }
                }
            }

            // Appliquer la rotation de la caméra
            camera.rotation.y = joueur.rotation;
            camera.position.x = joueur.x;
            camera.position.z = joueur.z;

            renderer.render(scene, camera);
        }

        // Effet de flash rouge si on touche un piège
        function flashRouge() {
            renderer.setClearColor(0xff0000);
            setTimeout(() => {
                renderer.setClearColor(etape === "foret" ? 0x0a0f0a : 0x050505);
            }, 150);
        }

        // Redimensionner le jeu si la fenêtre change
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
