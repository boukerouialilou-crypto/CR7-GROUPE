<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Garage 3D & Boost</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Arial Black', sans-serif;
        }
        body {
            background-color: #080a10; color: white;
            overflow: hidden; height: 100vh; user-select: none;
        }
        /* COMPTEUR DE VITESSE */
        #interface-vitesse {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); text-align: center; z-index: 10;
        }
        #compteur {
            font-size: 3.5rem; color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }
        .unite { font-size: 1.2rem; color: #8a99ad; }

        /* MENU DE CUSTOMISATION */
        #garage-menu {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: rgba(15, 20, 32, 0.85);
            padding: 20px; border-radius: 25px; border: 2px solid #1f293d;
            display: flex; flex-direction: column; gap: 15px;
            width: 90%; max-width: 450px; z-index: 10; text-align: center;
        }
        .palette-couleurs { display: flex; justify-content: center; gap: 15px; }
        .pastille {
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            border: 3px solid white; transition: transform 0.2s;
        }
        .pastille:active { transform: scale(0.9); }

        /* BOUTON BOOST GÉANT */
        #btn-boost {
            background: linear-gradient(135deg, #ff0055, #ff5500);
            border: none; color: white; padding: 12px 35px;
            font-size: 1.3rem; font-weight: bold; border-radius: 30px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(255, 0, 85, 0.4);
        }
        #btn-boost:active { transform: scale(0.95); filter: brightness(1.2); }
    </style>
    <!-- Moteur 3D Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- COMPTEUR NUMÉRIQUE -->
    <div id="interface-vitesse">
        <div id="compteur">0 <span class="unite">KM/H</span></div>
    </div>

    <!-- PANNEAU DE CONTRÔLE -->
    <div id="garage-menu">
        <p style="font-size: 0.9rem; color: #8a99ad; letter-spacing: 1px;">PEINTURE CUSTOM</p>
        <div class="palette-couleurs">
            <div class="pastille" style="background-color: #dc2626;" onclick="changerCouleur(0xf87171)"></div> <!-- Rouge -->
            <div class="pastille" style="background-color: #2563eb;" onclick="changerCouleur(0x60a5fa)"></div> <!-- Bleu -->
            <div class="pastille" style="background-color: #16a34a;" onclick="changerCouleur(0x4ade80)"></div> <!-- Vert -->
            <div class="pastille" style="background-color: #eab308;" onclick="changerCouleur(0xfacc15)"></div> <!-- Jaune -->
        </div>
        <button id="btn-boost">🚀 ENCLENCHER LE BOOST</button>
    </div>

    <script>
        let scene, camera, renderer, voiture, carrosserieMat;
        let vitesse = 0, enBoost = false;

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x080a10);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 7);
            camera.lookAt(0, 0.5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lumières du showroom
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            let p1 = new THREE.DirectionalLight(0xffffff, 0.8); p1.position.set(5, 10, 5); scene.add(p1);
            let p2 = new THREE.DirectionalLight(0x00ffcc, 0.4); p2.position.set(-5, 5, -5); scene.add(p2);

            // Création d'une voiture de sport futuriste simplifiée
            voiture = new THREE.Group();
            carrosserieMat = new THREE.MeshStandardMaterial({ color: 0x60a5fa, roughness: 0.2, metalness: 0.8 });
            let vitreMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });
            let roueMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });

            // Base du châssis
            let base = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 3.8), carrosserieMat);
            base.position.y = 0.3; voiture.add(base);

            // Cockpit / Toit
            let toit = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 1.8), carrosserieMat);
            toit.position.set(0, 0.75, -0.2); voiture.add(toit);

            // Vitres
            let pareBrise = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.4, 0.1), vitreMat);
            pareBrise.position.set(0, 0.7, 0.75); pareBrise.rotation.x = 0.5; voiture.add(pareBrise);

            // Roues
            let gRoue = new THREE.CylinderGeometry(0.35, 0.35, 0.4, 24);
            let positionsRoues = [[-1, 0.35, 1.2], [1, 0.35, 1.2], [-1, 0.35, -1.2], [1, 0.35, -1.2]];
            positionsRoues.forEach(pos => {
                let r = new THREE.Mesh(gRoue, roueMat);
                r.rotation.z = Math.PI / 2; r.position.set(pos[0], pos[1], pos[2]);
                voiture.add(r);
            });

            scene.add(voiture);

            // Sol brillant style néon
            let grille = new THREE.GridHelper(30, 30, 0x1f293d, 0x121824);
            grille.position.y = 0; scene.add(grille);

            boucleAnimation();
        }

        function changerCouleur(hex) {
            carrosserieMat.color.setHex(hex);
        }

        // Système de BOOST
        const btnBoost = document.getElementById('btn-boost');
        const txtCompteur = document.getElementById('compteur');

        btnBoost.addEventListener('mousedown', () => enBoost = true);
        btnBoost.addEventListener('mouseup', () => enBoost = false);
        btnBoost.addEventListener('touchstart', (e) => { e.preventDefault(); enBoost = true; });
        btnBoost.addEventListener('touchend', () => enBoost = false);

        function boucleAnimation() {
            requestAnimationFrame(boucleAnimation);

            // Rotation lente de la voiture pour le mode présentation
            voiture.rotation.y += 0.01 + (vitesse * 0.0002);

            // Gestion de la vitesse numérique
            if (enBoost) {
                if (vitesse < 380) vitesse += 4; // Accélération giga rapide
                // Secousse de la caméra pour l'effet de vitesse
                camera.position.x = (Math.random() - 0.5) * (vitesse * 0.0005);
            } else {
                if (vitesse > 0) vitesse -= 3; // Décélération fluide
                camera.position.x = 0;
            }
            if (vitesse < 0) vitesse = 0;
            txtCompteur.innerHTML = Math.floor(vitesse) + ` <span class="unite">KM/H</span>`;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init3D();
    </script>
</body>
</html>
