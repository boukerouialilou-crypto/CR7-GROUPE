<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Cosmic Racing</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #jeu-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(#1a0033, #050010);
            border: 4px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* INTERFACES */
        .ecran {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 0, 16, 0.85);
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff;
            margin-bottom: 5px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            margin-top: 20px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.8);
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #00ffff;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #00ffff;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="jeu-container">
        <!-- BARRE DE SCORE -->
        <div id="hud">SCORE: <span id="score-val">0</span></div>

        <!-- ÉCRAN DE DÉPART -->
        <div id="ecran-start" class="ecran">
            <h1>COSMIC RACING</h1>
            <p style="color: #aaa; font-size: 0.9rem; padding: 0 20px;">Esquive les blocs rouges et attrape les boosts jaunes !</p>
            <button id="bouton-jouer">PILOTER</button>
        </div>

        <!-- ÉCRAN DE FIN -->
        <div id="ecran-fin" class="ecran" style="display: none;">
            <h1 style="color: #ff0055; text-shadow: 0 0 10px #ff0055;">CRASH ! 💥</h1>
            <p style="font-size: 1.2rem;">Score Final : <span id="score-final">0</span></p>
            <button onclick="recommencer()">REESSAYER</button>
        </div>

        <!-- LE CANVAS DU JEU -->
        <canvas id="jeuCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let jeuEnCours = false;
        let score = 0;
        let vitesse = 5;
        let touches = {};

        // Joueur (La voiture)
        let joueur = {
            x: 175,
            y: 500,
            largeur: 50,
            hauteur: 70,
            vitesseX: 6
        };

        // Tableaux d'objets
        let obstacles = [];
        let etoiles = [];

        // Événements touches
        window.addEventListener("keydown", (e) => touches[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => touches[e.key.toLowerCase()] = false);

        document.getElementById("bouton-jouer").addEventListener("click", () => {
            document.getElementById("ecran-start").style.display = "none";
            jeuEnCours = true;
            init();
            boucleJeu();
        });

        function init() {
            score = 0;
            vitesse = 5;
            obstacles = [];
            joueur.x = 175;
            
            // Créer des étoiles de fond d'écran
            for(let i = 0; i < 40; i++) {
                etoiles.push({ x: Math.random() * 400, y: Math.random() * 600, taille: Math.random() * 3 });
            }
        }

        function genererObstacle() {
            if (Math.random() < 0.03) {
                let types = ["piege", "boost"];
                let typeAleatoire = Math.random() < 0.75 ? "piege" : "boost";
                
                obstacles.push({
                    x: Math.random() * (400 - 40),
                    y: -50,
                    largeur: 40,
                    hauteur: 40,
                    type: typeAleatoire
                });
            }
        }

        function boucleJeu() {
            if (!jeuEnCours) return;

            // 1. NETTOYER L'ÉCRAN
            ctx.clearRect(0, 0, 400, 600);

            // 2. DESSINER LES ÉTOILES (DÉFILEMENT)
            ctx.fillStyle = "#ffffff";
            etoiles.forEach(etoile => {
                ctx.fillRect(etoile.x, etoile.y, etoile.taille, etoile.taille);
                etoile.y += vitesse * 0.5;
                if(etoile.y > 600) etoile.y = 0;
            });

            // 3. CONTRÔLES DU JOUEUR
            if (touches["q"] || touches["a"] || touches["arrowleft"]) {
                joueur.x -= joueur.vitesseX;
            }
            if (touches["d"] || touches["arrowright"]) {
                joueur.x += joueur.vitesseX;
            }

            // Limites de l'écran pour la voiture
            if (joueur.x < 10) joueur.x = 10;
            if (joueur.x > 340) joueur.x = 340;

            // DESSINER LE JOUEUR (Voiture Cyber-Néon)
            ctx.fillStyle = "#00ffff"; // Corps principal
            ctx.fillRect(joueur.x, joueur.y, joueur.largeur, joueur.hauteur);
            ctx.fillStyle = "#ff00ff"; // Phares / Cockpit
            ctx.fillRect(joueur.x + 10, joueur.y + 15, 30, 20);

            // 4. GESTION DES BLOCS (PIÈGES ET BOOSTS)
            genererObstacle();

            obstacles.forEach((obs, index) => {
                obs.y += vitesse;

                // Dessiner selon le type
                if (obs.type === "piege") {
                    ctx.fillStyle = "#ff0055"; // Rouge = Piège
                    ctx.shadowColor = "#ff0055";
                } else {
                    ctx.fillStyle = "#ffff00"; // Jaune = Boost
                    ctx.shadowColor = "#ffff00";
                }
                ctx.fillRect(obs.x, obs.y, obs.largeur, obs.hauteur);

                // Détection de Collision
                if (joueur.x < obs.x + obs.largeur &&
                    joueur.x + joueur.largeur > obs.x &&
                    joueur.y < obs.y + obs.hauteur &&
                    joueur.y + joueur.hauteur > obs.y) {
                    
                    if (obs.type === "piege") {
                        perdre();
                    } else {
                        score += 500; // Super Boost !
                        obstacles.splice(index, 1);
                    }
                }

                // Supprimer les blocs passés
                if (obs.y > 600) {
                    obstacles.splice(index, 1);
                }
            });

            // Augmentation du score et de la vitesse
            score += 1;
            vitesse += 0.002;
            document.getElementById("score-val").innerText = score;

            requestAnimationFrame(boucleJeu);
        }

        function perdre() {
            jeuEnCours = false;
            document.getElementById("score-final").innerText = score;
            document.getElementById("ecran-fin").style.display = "flex";
        }

        function recommencer() {
            document.getElementById("ecran-fin").style.display = "none";
            jeuEnCours = true;
            init();
            boucleJeu();
        }
    </script>
</body>
</html>
