<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Racing Mobile</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            color: white;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #jeu-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            background: linear-gradient(#1a0033, #050010);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* BARRE DE SCORE */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 1.5rem;
            text-shadow: 0 0 5px #00ffff;
            z-index: 5;
        }

        /* INTERFACES (START / FIN) */
        .ecran {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 0, 16, 0.9);
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.3rem;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00ff;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        /* BOUTONS TACTILES POUR MOBILE */
        #controles-mobiles {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 5;
        }

        .btn-tactile {
            width: 45%;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #00ffff;
            border-radius: 15px;
            color: #00ffff;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .btn-tactile:active {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="jeu-container">
        <!-- SCORE -->
        <div id="hud">SCORE: <span id="score-val">0</span></div>

        <!-- ÉCRAN DE DÉPART -->
        <div id="ecran-start" class="ecran">
            <h1>COSMIC RACING MOBILE</h1>
            <p style="color: #aaa; font-size: 1rem; padding: 0 30px; margin-bottom: 30px;">Esquive le rouge, attrape le jaune !</p>
            <button id="bouton-jouer">JOUER</button>
        </div>

        <!-- ÉCRAN DE FIN -->
        <div id="ecran-fin" class="ecran" style="display: none;">
            <h1 style="color: #ff0055;">CRASH ! 💥</h1>
            <p style="font-size: 1.4rem; margin-bottom: 30px;">Score : <span id="score-final">0</span></p>
            <button onclick="recommencer()">REJOUER</button>
        </div>

        <!-- CONTROLES BAS DE PAGE -->
        <div id="controles-mobiles" style="display: none;">
            <div id="btn-gauche" class="btn-tactile">◀ GAUCHE</div>
            <div id="btn-droite" class="btn-tactile">DROITE ▶</div>
        </div>

        <!-- ZONE DE RENDU -->
        <canvas id="jeuCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("jeuCanvas");
        const ctx = canvas.getContext("2d");

        let jeuEnCours = false;
        let score = 0;
        let vitesse = 6;
        let directionJoueur = 0; // -1 = Gauche, 1 = Droite, 0 = Stop

        let joueur = { x: 0, y: 0, largeur: 50, hauteur: 75, vitesseX: 7 };
        let obstacles = [];
        let etoiles = [];

        // Ajuster la taille du canvas à l'écran du téléphone
        function redimensionner() {
            canvas.width = window.innerWidth > 450 ? 450 : window.innerWidth;
            canvas.height = window.innerHeight;
            joueur.y = canvas.height - 200; // Positionner la voiture au dessus des boutons
            if(!jeuEnCours) joueur.x = canvas.width / 2 - joueur.largeur / 2;
        }
        window.addEventListener('resize', redimensionner);

        // Gestion du tactile mobile
        const btnG = document.getElementById("btn-gauche");
        const btnD = document.getElementById("btn-droite");

        btnG.addEventListener("touchstart", (e) => { e.preventDefault(); directionJoueur = -1; });
        btnG.addEventListener("touchend", () => directionJoueur = 0);
        btnD.addEventListener("touchstart", (e) => { e.preventDefault(); directionJoueur = 1; });
        btnD.addEventListener("touchend", () => directionJoueur = 0);

        // Version ordinateur au cas où (clavier)
        window.addEventListener("keydown", (e) => {
            if(e.key === "ArrowLeft" || e.key === "q" || e.key === "a") directionJoueur = -1;
            if(e.key === "ArrowRight" || e.key === "d") directionJoueur = 1;
        });
        window.addEventListener("keyup", () => directionJoueur = 0);

        document.getElementById("bouton-jouer").addEventListener("click", () => {
            document.getElementById("ecran-start").style.display = "none";
            document.getElementById("controles-mobiles").style.display = "flex";
            jeuEnCours = true;
            redimensionner();
            init();
            boucleJeu();
        });

        function init() {
            score = 0;
            vitesse = 6;
            obstacles = [];
            etoiles = [];
            directionJoueur = 0;
            joueur.x = canvas.width / 2 - joueur.largeur / 2;
            
            for(let i = 0; i < 30; i++) {
                etoiles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, taille: Math.random() * 2.5 });
            }
        }

        function boucleJeu() {
            if (!jeuEnCours) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Étoiles de fond
            ctx.fillStyle = "#ffffff";
            etoiles.forEach(etoile => {
                ctx.fillRect(etoile.x, etoile.y, etoile.taille, etoile.taille);
                etoile.y += vitesse * 0.4;
                if(etoile.y > canvas.height) etoile.y = 0;
            });

            // Mouvement du joueur
            joueur.x += directionJoueur * joueur.vitesseX;
            if (joueur.x < 15) joueur.x = 15;
            if (joueur.x > canvas.width - joueur.largeur - 15) joueur.x = canvas.width - joueur.largeur - 15;

            // Dessiner la voiture néon
            ctx.fillStyle = "#00ffff";
            ctx.fillRect(joueur.x, joueur.y, joueur.largeur, joueur.hauteur);
            ctx.fillStyle = "#ff00ff";
            ctx.fillRect(joueur.x + 8, joueur.y + 15, joueur.largeur - 16, 22);

            // Générer Obstacles
            if (Math.random() < 0.035) {
                let typeAleatoire = Math.random() < 0.78 ? "piege" : "boost";
                obstacles.push({
                    x: Math.random() * (canvas.width - 50 - 30) + 15,
                    y: -50,
                    largeur: 42,
                    hauteur: 42,
                    type: typeAleatoire
                });
            }

            // Gestion obstacles
            obstacles.forEach((obs, index) => {
                obs.y += vitesse;

                if (obs.type === "piege") {
                    ctx.fillStyle = "#ff0055";
                } else {
                    ctx.fillStyle = "#ffff00";
                }
                ctx.fillRect(obs.x, obs.y, obs.largeur, obs.hauteur);

                // Collision
                if (joueur.x < obs.x + obs.largeur &&
                    joueur.x + joueur.largeur > obs.x &&
                    joueur.y < obs.y + obs.hauteur &&
                    joueur.y + joueur.hauteur > obs.y) {
                    
                    if (obs.type === "piege") {
                        perdre();
                    } else {
                        score += 500;
                        obstacles.splice(index, 1);
                    }
                }

                if (obs.y > canvas.height) {
                    obstacles.splice(index, 1);
                }
            });

            score += 1;
            vitesse += 0.0025;
            document.getElementById("score-val").innerText = score;

            requestAnimationFrame(boucleJeu);
        }

        function perdre() {
            jeuEnCours = false;
            document.getElementById("controles-mobiles").style.display = "none";
            document.getElementById("score-final").innerText = score;
            document.getElementById("ecran-fin").style.display = "flex";
        }

        function recommencer() {
            document.getElementById("ecran-fin").style.display = "none";
            document.getElementById("controles-mobiles").style.display = "flex";
            jeuEnCours = true;
            init();
            boucleJeu();
        }

        redimensionner();
    </script>
</body>
</html>
