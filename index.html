<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Cosmic Racing 3D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial Black', Gadget, sans-serif;
            background-color: #050510;
            user-select: none;
        }

        /* ÉCRAN D'ACCUEIL */
        #menu-ecran {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a0033, #050010);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            color: white;
            text-align: center;
        }

        #menu-ecran h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #ff00ff;
            letter-spacing: 4px;
        }

        #bouton-jouer {
            padding: 15px 50px;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        #bouton-jouer:hover {
            transform: scale(1.1) rotate(-1deg);
            box-shadow: 0 0 35px rgba(255, 0, 255, 0.9);
        }

        /* TABLEAU DE BORD (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 1.8rem;
            z-index: 5;
            display: none;
            text-shadow: 0 0 10px #00ffff;
        }

        #vitesse-compteur {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ff00ff;
            font-size: 2rem;
            z-index: 5;
            display: none;
            text-shadow: 0 0 10px #ff00ff;
        }

        /* MESSAGE DE FIN */
        #overlay-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 3.5rem;
            text-align: center;
            z-index: 8;
            display: none;
            text-shadow: 0 0 20px #ff0000;
        }

        #bouton-recommencer {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1.2rem;
            background-color: white;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
    <!-- Moteur 3D Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- INTERFACE PRINCIPALE -->
    <div id="menu-ecran">
        <h1>COSMIC RACING</h1>
        <p style="color: #aaa; font-size: 1.2rem; margin-bottom: 30px;">Esquive les blocs rouges, attrape les boosts jaunes !</p>
        <button id="bouton-jouer">PILOTER</button>
    </div>

    <!-- STATS EN DIRECT -->
    <div id="hud">SCORE: <span id="score-val">0</span></div>
    <div id="vitesse-compteur"><span id="vitesse-val">100</span> KM/H</div>

    <div id="overlay-message">
        <span id="raison-mort">CRASH ! 💥</span><br>
        <span style="font-size: 1.5rem; color: #00ffff;">Ton score final : <span id="score-final">0</span></span><br>
        <button id="bouton-recommencer" onclick="location.reload()">REJOUER</button>
    </div>

    <script>
        let scene, camera, renderer;
        let jeuEnCours = false;
        let touches = {};
        let score = 0;
        
        // Paramètres de la course
        let vitesseRoute = 0.4;
        const largeurPiste = 9;
        
        // Objets du jeu
        let voiture;
        let segmentsRoute = [];
        let obstacles = [];
        let bonusBoosts = [];

        const hudScore = document.getElementById("score-val");
        const hudVitesse = document.getElementById("vitesse-val");
        const overlayMessage = document.getElementById("overlay-message");

        // Événements boutons et touches
        document.getElementById("bouton-jouer").addEventListener("click", () => {
            document.getElementById("menu-ecran").style.display = "none";
            document.getElementById("hud").style.display = "block";
            document.getElementById("vitesse-compteur").style.display = "block";
            jeuEnCours = true;
            init();
            animate();
        });

        window.addEventListener('keydown', (e) => { touches[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { touches[e.key.toLowerCase()] = false; });

        function init() {
            // Création du monde spatial
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x030208);
            scene.fog = new THREE.FogExp2(0x030208, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Caméra placée juste derrière et au-dessus de la voiture
            camera.position.set(0, 3.5, 7);
            camera.rotation.x = -0.25;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lumières stylées "Néon Cyber"
            const ambiante = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambiante);

            const lumiereBleue = new THREE.DirectionalLight(0x00ffff, 1);
            lumiereBleue.position.set(-5, 10, 5);
            scene.add(lumiereBleue);

            const lumiereRose = new THREE.DirectionalLight(0xff00ff, 1);
            lumiereRose.position.set(5, 10, 5);
            scene.add(lumiereRose);

            creerVoiture();
            creerCircuitInitial();
            creerEtoiles();
        }

        // --- CRÉATION DE LA VOITURE (Un bolide cyber futuriste) ---
        function creerVoiture() {
            voiture = new THREE.Group();

            // Châssis principal (Cyan brillant)
            const geoChassis = new THREE.BoxGeometry(1.4, 0.5, 2.2);
            const matChassis = new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.2, metalness: 0.5 });
            const chassis = new THREE.Mesh(geoChassis, matChassis);
            chassis.position.y = 0.4;
            voiture.add(chassis);

            // Cockpit (Vitres teintées violettes)
            const geoCockpit = new THREE.BoxGeometry(0.9, 0.4, 1);
            const matCockpit = new THREE.MeshStandardMaterial({ color: 0xff00ff, roughness: 0.1 });
            const cockpit = new THREE.Mesh(geoCockpit, matCockpit);
            cockpit.position.set(0, 0.75, -0.2);
            voiture.add(cockpit);

            voiture.position.set(0, 0, 0);
            scene.add(voiture);
        }

        // --- CRÉATION DE LA PISTE CYBER ---
        function creerCircuitInitial() {
            // On génère de longs pans de route néon enchaînés
            for (let i = 0; i < 5; i++) {
                ajouterSegmentRoute(-i * 40);
            }
        }

        function ajouterSegmentRoute(zPos) {
            const geoPiste = new THREE.PlaneGeometry(largeurPiste, 40);
            const matPiste = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.7 });
            const piste = new THREE.Mesh(geoPiste, matPiste);
            piste.rotation.x = -Math.PI / 2;
            piste.position.set(0, 0, zPos);

            // Bordures lumineuses de la route (Néon Rose)
            const geoBordure = new THREE.BoxGeometry(0.2, 0.4, 40);
            const matBordure = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff });
            
            const bordureG = new THREE.Mesh(geoBordure, bordureG);
            bordureG.position.set(-largeurPiste/2, 0.2, 0);
            piste.add(bordureG);

            const bordureD = bordureG.clone();
            bordureD.position.x = largeurPiste/2;
            piste.add(bordureD);

            scene.add(piste);
            segmentsRoute.push(piste);
        }

        // --- CRÉATION DES ÉTOILES DE FOND ---
        function creerEtoiles() {
            const geoEtoile = new THREE.BufferGeometry();
            const nbEtoiles = 500;
            const positions = new Float32Array(nbEtoiles * 3);

            for(let i=0; i<nbEtoiles*3; i+=3) {
                positions[i] = (Math.random() - 0.5) * 150;
                positions[i+1] = Math.random() * 50;
                positions[i+2] = (Math.random() - 0.5) * 300;
            }

            geoEtoile.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const matEtoile = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4 });
            const etoiles = new THREE.Points(geoEtoile, matEtoile);
            scene.add(etoiles);
        }

        // --- GÉNÉRATION PROCEDURALE DES PIÈGES ET DES BONUS ---
        function genererObjets(zPos) {
            // 70% de chance d'ajouter un piège rouge ou un bonus jaune
            if (Math.random() < 0.4) {
                // Obstacle rouge
                const geoObs = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                const matObs = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 });
                const obs = new THREE.Mesh(geoObs, matObs);
                // Position sur une des 3 voies de la route (-3, 0, ou 3)
                const voies = [-3, 0, 3];
                obs.position.set(voies[Math.floor(Math.random() * voies.length)], 0.75, zPos);
                scene.add(obs);
                obstacles.push(obs);
            } else if (Math.random() < 0.3) {
                // Bonus Jaune (Boost de points)
                const geoBoost = new THREE.BoxGeometry(0.8, 0.8, 0.8);
                const matBoost = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x555500 });
                const boost = new THREE.Mesh(geoBoost, matBoost);
                const voies = [-3, 0, 3];
                boost.position.set(voies[Math.floor(Math.random() * voies.length)], 0.5, zPos);
                scene.add(boost);
                bonusBoosts.push(boost);
            }
        }

        // --- BOUCLE D'ANIMATION PRINCIPALE ---
        function animate() {
            if (!jeuEnCours) return;

            requestAnimationFrame(animate);

            // 1. Contrôles de la voiture (Gauche / Droite)
            if (touches['q'] || touches['a'] || touches['arrowleft']) {
                voiture.position.x -= 0.15;
                voiture.rotation.z = 0.15; // Effet d'inclinaison dans le virage
            } else if (touches['d'] || touches['arrowright']) {
                voiture.position.x += 0.15;
                voiture.rotation.z = -0.15;
            } else {
                voiture.rotation.z *= 0.8; // Redresser la voiture
            }

            // Bloquer la voiture aux limites de la piste
            if (voiture.position.x < -largeurPiste / 2 + 0.7) voiture.position.x = -largeurPiste / 2 + 0.7;
            if (voiture.position.x > largeurPiste / 2 - 0.7) voiture.position.x = largeurPiste / 2 - 0.7;

            // 2. Faire défiler la route vers l'arrière (simule la vitesse de la voiture)
            vitesseRoute += 0.0001; // Accélération constante du jeu !
            score += 1;
            hudScore.innerText = score;
            hudVitesse.innerText = Math.floor(vitesseRoute * 400);

            segmentsRoute.forEach(piste => {
                piste.position.z += vitesseRoute * 40; // Avancement de la route

                // Si un morceau de piste sort complètement derrière l'écran, on le remet tout au fond
                if (piste.position.z > 40) {
                    piste.position.z = -160;
                    // Générer des nouveaux obstacles sur ce morceau réinitialisé
                    genererObjets(piste.position.z - Math.random() * 20);
                }
            });

            // 3. Gestion des Obstacles Rouges (Déplacement et collisions)
            obstacles.forEach((obs, index) => {
                obs.position.z += vitesseRoute * 40;

                // Collision voiture - obstacle rouge
                let dist = voiture.position.distanceTo(obs.position);
                if (dist < 1.3) {
                    finDePartie("CRASH ! 💥");
                }

                // Nettoyer les vieux obstacles passés
                if (obs.position.z > 20) {
                    scene.remove(obs);
                    obstacles.splice(index, 1);
                }
            });

            // 4. Gestion des Bonus Jaunes (Rotation et ramassage)
            bonusBoosts.forEach((boost, index) => {
                boost.position.z += vitesseRoute * 40;
                boost.rotation.y += 0.05; // Fait tourner le cube d'énergie

                // Ramassage du boost
                let dist = voiture.position.distanceTo(boost.position);
                if (dist < 1.2) {
                    score += 500; // Bonus massif de points
                    scene.remove(boost);
                    bonusBoosts.splice(index, 1);
                    
                    // Flash flash néon bleu de succès
                    renderer.setClearColor(0x003333);
                    setTimeout(() => renderer.setClearColor(0x030208), 80);
                }

                if (boost.position.z > 20) {
                    scene.remove(boost);
                    bonusBoosts.splice(index, 1);
                }
            });

            renderer.render(scene, camera);
        }

        // --- FIN DE PARTIE ---
        function finDePartie(raison) {
            jeuEnCours = false;
            document.getElementById("hud").style.display = "none";
            document.getElementById("vitesse-compteur").style.display = "none";
            
            document.getElementById("raison-mort").innerText = raison;
            document.getElementById("score-final").innerText = score;
            overlayMessage.style.display = "block";
        }

        // Redimensionner le jeu proprement
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
