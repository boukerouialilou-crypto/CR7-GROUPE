<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barre de Recherche Q&A Intelligente</title>
  <style>
    /* Styles généraux avec dégradé moderne */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    /* Carte principale */
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 550px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    h2 {
      margin-top: 0;
      color: #2d3748;
      font-size: 24px;
      text-align: center;
      margin-bottom: 25px;
    }

    /* Conteneur de recherche */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s ease;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    button {
      padding: 14px 24px;
      background: linear-gradient(135deg, #ff7eb3 0%, #ff758c 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 117, 140, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(255, 117, 140, 0.6);
    }

    /* Zone de réponse */
    .answer-box {
      display: none; /* Caché au départ */
      margin-top: 20px;
      padding: 20px;
      border-radius: 14px;
      animation: fadeIn 0.4s ease-in-out;
    }

    /* Style si une réponse est trouvée */
    .answer-box.success {
      background: #f0fff4;
      border: 2px solid #68d391;
      color: #22543d;
    }

    /* Style si aucune réponse n'est trouvée */
    .answer-box.warning {
      background: #fffaf0;
      border: 2px solid #fbd38d;
      color: #744210;
    }

    .answer-box p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
    }

    /* Animation d'apparition */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>✨ Posez votre question</h2>
    
    <div class="search-box">
      <input type="text" id="userInput" placeholder="Ex: Comment changer mon mot de passe ?" />
      <button onclick="searchAnswer()">Chercher</button>
    </div>

    <div id="answerContainer" class="answer-box">
      <p id="answerText"></p>
    </div>
  </div>

  <script>
    // Base de données : ajoute tes propres questions et réponses ici !
    const faqData = [
      {
        keywords: ["mot", "passe", "compte", "connexion", "oublié", "changer"],
        answer: "🔐 Pour modifier votre mot de passe, allez dans Mon Compte > Sécurité > Modifier le mot de passe."
      },
      {
        keywords: ["bonjour", "salut", "hello", "coucou", "ca", "va"],
        answer: "👋 Bonjour ! Comment puis-je vous aider aujourd'hui ?"
      },
      {
        keywords: ["prix", "tarif", "payant", "gratuit", "abonnement", "coût"],
        answer: "💳 L'inscription de base est gratuite ! Nos abonnements Premium commencent à partir de 9,99€/mois."
      },
      {
        keywords: ["contact", "support", "aide", "email", "joindre", "telephone"],
        answer: "📞 Vous pouvez contacter notre équipe par email à support@exemple.com ou directement par téléphone au 01 23 45 67 89."
      }
    ];

    function searchAnswer() {
      const input = document.getElementById("userInput").value.toLowerCase().trim();
      const container = document.getElementById("answerContainer");
      const text = document.getElementById("answerText");

      if (input === "") {
        text.innerHTML = "⚠️ Veuillez écrire une question avant de lancer la recherche.";
        container.className = "answer-box warning";
        container.style.display = "block";
        return;
      }

      // Nettoyer la phrase en mots individuels
      const userWords = input.split(/[ ,.?'"!]+/);

      let bestMatch = null;
      let maxMatches = 0;

      // Chercher la réponse qui correspond au plus grand nombre de mots-clés
      faqData.forEach(item => {
        let matches = 0;
        item.keywords.forEach(keyword => {
          if (userWords.includes(keyword) || input.includes(keyword)) {
            matches++;
          }
        });

        if (matches > maxMatches) {
          maxMatches = matches;
          bestMatch = item;
        }
      });

      // Afficher le résultat
      if (bestMatch && maxMatches > 0) {
        text.innerHTML = bestMatch.answer;
        container.className = "answer-box success";
      } else {
        text.innerHTML = "🔍 Désolé, je n'ai pas compris la question. Essayez avec des mots simples (ex: <i>mot de passe</i>, <i>prix</i>, <i>contact</i>).";
        container.className = "answer-box warning";
      }

      container.style.display = "block";
    }

    // Déclenchement avec la touche "Entrée"
    document.getElementById("userInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        searchAnswer();
      }
    });
  </script>

</body>
</html>
