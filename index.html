<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Soundboard 🔊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0b0d16;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.5rem;
            color: #00ffcc;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            text-align: center;
        }

        p {
            color: #8a99ad;
            margin-bottom: 40px;
            text-align: center;
            font-size: 1rem;
        }

        /* GRILLE DE BOUTONS ACCORDÉS AUX COULEURS */
        .grid-sons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .btn-son {
            background-color: #16192b;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 30px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-son:active {
            transform: scale(0.92);
        }

        .icone {
            font-size: 2.5rem;
        }

        /* LES COULEURS NÉON DES BOUTONS */
        .btn-rouge { border-color: #ff0055; }
        .btn-rouge:hover { box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); background-color: rgba(255, 0, 85, 0.1); }

        .btn-bleu { border-color: #00d2ff; }
        .btn-bleu:hover { box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); background-color: rgba(0, 210, 255, 0.1); }

        .btn-jaune { border-color: #ffea00; }
        .btn-jaune:hover { box-shadow: 0 0 20px rgba(255, 234, 0, 0.5); background-color: rgba(255, 234, 0, 0.1); }

        .btn-vert { border-color: #00ff66; }
        .btn-vert:hover { box-shadow: 0 0 20px rgba(0, 255, 102, 0.5); background-color: rgba(0, 255, 102, 0.1); }

        .btn-violet { border-color: #b700ff; }
        .btn-violet:hover { box-shadow: 0 0 20px rgba(183, 0, 255, 0.5); background-color: rgba(183, 0, 255, 0.1); }

        .btn-orange { border-color: #ff6a00; }
        .btn-orange:hover { box-shadow: 0 0 20px rgba(255, 106, 0, 0.5); background-color: rgba(255, 106, 0, 0.1); }
    </style>
</head>
<body>

    <h1>BOÎTE À SONS CYBER 🔊</h1>
    <p>Clique sur les boutons pour lancer des bruits flashes en plein milieu d'une discussion !</p>

    <div class="grid-sons">
        
        <!-- BOUTON 1 : EXPLOSION -->
        <button class="btn-son btn-rouge" onclick="jouerSon('https://actions.google.com/sounds/v1/science_fiction/retro_game_laser_explosion.ogg')">
            <span class="icone">💥</span>
            <span>Explosion</span>
        </button>

        <!-- BOUTON 2 : LASER -->
        <button class="btn-son btn-bleu" onclick="jouerSon('https://actions.google.com/sounds/v1/science_fiction/alien_creature_pew_pew.ogg')">
            <span class="icone">🔫</span>
            <span>Laser</span>
        </button>

        <!-- BOUTON 3 : PIÈCE JEU VIDÉO -->
        <button class="btn-son btn-jaune" onclick="jouerSon('https://actions.google.com/sounds/v1/video_games/classic_video_game_pixel_crunch.ogg')">
            <span class="icone">🪙</span>
            <span>Level Up</span>
        </button>

        <!-- BOUTON 4 : CORNE DE BRUME / ALERTE -->
        <button class="btn-son btn-vert" onclick="jouerSon('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg')">
            <span class="icone">🚨</span>
            <span>Bip Alerte</span>
        </button>

        <!-- BOUTON 5 : TÉLÉPORTATION -->
        <button class="btn-son btn-violet" onclick="jouerSon('https://actions.google.com/sounds/v1/science_fiction/game_power_up.ogg')">
            <span class="icone">✨</span>
            <span>Power Up</span>
        </button>

        <!-- BOUTON 6 : ÉCHEC -->
        <button class="btn-son btn-orange" onclick="jouerSon('https://actions.google.com/sounds/v1/video_games/game_over_retro_glitch.ogg')">
            <span class="icone">💀</span>
            <span>Game Over</span>
        </button>

    </div>

    <script>
        // Fonction magique pour charger et jouer le son directement en 1 clic
        function jouerSon(urlAudio) {
            const audio = new Audio(urlAudio);
            audio.currentTime = 0; // Permet de rejouer le son immédiatement même s'il n'est pas fini
            audio.play();
        }
    </script>

</body>
</html>
