<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Garage 3D - Réparé</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Arial Black', sans-serif;
        }
        body {
            background-color: #080a10; color: white;
            overflow: hidden; height: 100vh; user-select: none;
            touch-action: none;
        }
        /* COMPTEUR */
        #interface-vitesse {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); text-align: center; z-index: 10;
        }
        #compteur {
            font-size: 3.5rem; color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
        }
        .unite { font-size: 1.2rem; color: #8a99ad; }

        /* MENU CUSTOM */
        #garage-menu {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); background: rgba(15, 20, 32, 0.9);
            padding: 20px; border-radius: 25px; border: 2px solid #1f293d;
            display: flex; flex-direction: column; gap: 15px;
            width: 90%; max-width: 450px; z-index: 10; text-align: center;
        }
        .palette-couleurs { display: flex; justify-content: center; gap: 15px; }
        .pastille {
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            border: 3px solid white; transition: transform 0.1s;
        }
        /* BOOST */
        #btn-boost {
            background: linear-gradient(135deg, #ff0055, #ff5500);
            border: none; color: white; padding: 15px 35px;
            font-size: 1.3rem; font-weight: bold; border-radius: 30px;
            cursor: pointer; box-shadow: 0 5px 20px rgba(255, 0, 85, 0.4);
        }
        #instructions {
            font-size: 0.8rem; color: #64748b; margin-top: 5px;
        }
    </style>
    <!-- Chargement sécurisé du script 3D -->
    <script src="https://template.canva.com/EAENvp7Ym7A/1/resources/three.min.js" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';"></script>
</head>
<body>

    <div id="interface-vitesse">
        <div id="compteur">0 <span class="unite">KM/H</span></div>
    </div>

    <div id="garage-menu">
        <p style="font-size: 0.85rem; color: #8a99ad; letter-spacing: 1px;">PEINTURE CUSTOM</p>
        <div class="palette-couleurs">
            <div class="pastille" style="background-color: #ef4444;" onclick="changerCouleur(0xef4444)"></div>
            <div class="pastille" style="background-color: #3b82f6;" onclick="changerCouleur(0x3b82f6)"></div>
            <div class="pastille" style="background-color: #22c55e;" onclick="changerCouleur(0x22c55e)"></div>
            <div class="pastille" style="background-color: #eab308;" onclick="changerCouleur(0xeab308)"></div>
        </div>
        <button id="btn-boost">🚀 APPUYER POUR RESTER EN BOOST</button>
        <div id="instructions">Sur PC : Reste appuyé sur <b>Z</b> pour avancer et <b>S</b> pour reculer !</div>
    </div>

    <script>
        let scene, camera, renderer, voiture, carrosserieMat;
        let vitesse = 0, enBoost = false, enRecul = false;

        function init3D() {
            if (typeof THREE === 'undefined') {
                setTimeout(init3D, 500); // Attend que Three.js charge si connexion lente
                return;
            }

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x080a10);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3.5, 6.5);
            camera.lookAt(0, 0.4, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            let p1 = new THREE.DirectionalLight(0xffffff, 0.8); p1.position.set(5, 10, 5); scene.add(p1);

            // Modèle de voiture solide
            voiture = new THREE.Group();
            carrosserieMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.3, metalness: 0.6 });
            
            let blocBas = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 3.2), carrosserieMat);
            blocBas.position.y = 0.3; voiture.add(blocBas);

            let blocHaut = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.45, 1.5), carrosserieMat);
            blocHaut.position.set(0, 0.72, -0.1); voiture.add(blocHaut);

            let gRoue = new THREE.CylinderGeometry(0.32, 0.32, 0.4, 16);
            let rMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            let rouesPos = [[-0.9, 0.32, 1], [0.9, 0.32, 1], [-0.9, 0.32, -1], [0.9, 0.32, -1]];
            
            rouesPos.forEach(pos => {
                let r = new THREE.Mesh(gRoue, rMat);
                r.rotation.z = Math.PI / 2; r.position.set(pos[0], pos[1], pos[2]);
                voiture.add(r);
            });

            scene.add(voiture);

            let grille = new THREE.GridHelper(40, 40, 0x1f293d, 0x121824);
            scene.add(grille);

            boucleAnimation();
        }

        function changerCouleur(hex) {
            if (carrosserieMat) carrosserieMat.color.setHex(hex);
        }

        // Événements souris/tactile pour le bouton BOOST
        const btn = document.getElementById('btn-boost');
        btn.addEventListener('mousedown', () => enBoost = true);
        btn.addEventListener('mouseup', () => enBoost = false);
        btn.addEventListener('mouseleave', () => enBoost = false);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); enBoost = true; });
        btn.addEventListener('touchend', () => enBoost = false);

        // Clavier PC (Z et S)
        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'z') enBoost = true;
            if(e.key.toLowerCase() === 's') enRecul = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.key.toLowerCase() === 'z') enBoost = false;
            if(e.key.toLowerCase() === 's') enRecul = false;
        });

        function boucleAnimation() {
            requestAnimationFrame(boucleAnimation);

            // Fait tourner la voiture en fonction de la vitesse
            voiture.rotation.y += 0.01 + (Math.abs(vitesse) * 0.0001);

            if (enBoost) {
                if (vitesse < 380) vitesse += 5;
                camera.position.x = (Math.random() - 0.5) * (vitesse * 0.0004); // Secousse vibration
            } else if (enRecul) {
                if (vitesse > -120) vitesse -= 4; // Marche arrière
            } else {
                // Ralentissement progressif (frein moteur)
                if (vitesse > 0) vitesse -= 3;
                if (vitesse < 0) vitesse += 3;
                if (Math.abs(vitesse) < 3) vitesse = 0;
                camera.position.x = 0;
            }

            document.getElementById('compteur').innerHTML = Math.floor(vitesse) + ` <span class="unite">KM/H</span>`;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        init3D();
    </script>
</body>
</html>
