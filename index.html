<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolColor App</title>
    
    <!-- Code spécial pour que le PC comprenne que c'est une application installable -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22SchoolColor%22%2C%22short_name%22%3A%22SchoolColor%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f111a%22%2C%22theme_color%22%3A%22%237f00ff%22%7D">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f111a;
            color: #ffffff;
            padding-bottom: 60px;
        }

        /* BARRE DE NAVIGATION APPLI */
        header {
            background: linear-gradient(135deg, #ff007f, #7f00ff);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* BOUTON INSTALLATION INTEGRÉ */
        #btn-installer-app {
            display: none;
            background-color: #ffffff;
            color: #7f00ff;
            border: none;
            padding: 8px 18px;
            font-weight: bold;
            border-radius: 20px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* CORPS DE LA PAGE */
        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        /* GRILLE DES PRODUITS */
        .grille-produits {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .carte-produit {
            background-color: #1a1d2e;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .carte-produit:hover {
            transform: translateY(-5px);
        }

        .produit-icone {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .carte-produit h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .prix {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-ajouter {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* LE PANIER */
        .panier-boite {
            background-color: #161925;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #7f00ff;
            height: fit-content;
            position: sticky;
            top: 140px;
        }

        .panier-boite h2 {
            font-size: 1.5rem;
            color: #00ffcc;
            margin-bottom: 15px;
            border-bottom: 2px solid #252a3d;
            padding-bottom: 10px;
        }

        .liste-panier {
            list-style: none;
            max-height: 240px;
            overflow-y: auto;
        }

        .item-panier {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #252a3d;
        }

        .total-zone {
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: #00ffcc;
        }

        .btn-commander {
            width: 100%;
            background: linear-gradient(45deg, #00ffcc, #00b386);
            color: #0f111a;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>STATION FOURNITURES 🎨</h1>
        <p>Ajoute ce site sur ton bureau pour l'ouvrir comme une application !</p>
        <!-- Bouton spécial PC -->
        <button id="btn-installer-app">📥 INSTALLER SUR LE PC</button>
    </header>

    <div class="container">
        
        <div class="grille-produits">
            <!-- Article 1 -->
            <div class="carte-produit" style="border-color: #ff0055;">
                <div>
                    <div class="produit-icone">🎒</div>
                    <h3>Sac à Dos Cyber</h3>
                    <div class="prix" style="color: #ff0055;">24,99 €</div>
                </div>
                <button class="btn-ajouter" style="background-color: #ff0055;" onclick="ajouterAuPanier('Sac à Dos Cyber', 24.99)">Ajouter au sac</button>
            </div>

            <!-- Article 2 -->
            <div class="carte-produit" style="border-color: #00ffff;">
                <div>
                    <div class="produit-icone">📐</div>
                    <h3>Kit Géométrie Néon</h3>
                    <div class="prix" style="color: #00ffff;">4,50 €</div>
                </div>
                <button class="btn-ajouter" style="background-color: #00ffff; color: #111;" onclick="ajouterAuPanier('Kit Géométrie', 4.50)">Ajouter au sac</button>
            </div>

            <!-- Article 3 -->
            <div class="carte-produit" style="border-color: #ffff00;">
                <div>
                    <div class="produit-icone">✏️</div>
                    <h3>Crayons Flash</h3>
                    <div class="prix" style="color: #ffff00;">2,99 €</div>
                </div>
                <button class="btn-ajouter" style="background-color: #ffff00; color: #111;" onclick="ajouterAuPanier('Crayons Flash', 2.99)">Ajouter au sac</button>
            </div>

            <!-- Article 4 -->
            <div class="carte-produit" style="border-color: #ff00ff;">
                <div>
                    <div class="produit-icone">📓</div>
                    <h3>Cahier Format Giga</h3>
                    <div class="prix" style="color: #ff00ff;">3,80 €</div>
                </div>
                <button class="btn-ajouter" style="background-color: #ff00ff;" onclick="ajouterAuPanier('Cahier Giga', 3.80)">Ajouter au sac</button>
            </div>
        </div>

        <!-- LE PANIER -->
        <div class="panier-boite">
            <h2>🛒 MON SAC À DOS</h2>
            <ul id="liste-items" class="liste-panier">
                <p style="color: #666; text-align: center; margin-top: 20px;" id="panier-vide">Ton sac est vide...</p>
            </ul>
            <div class="total-zone">
                <span>TOTAL :</span>
                <span><span id="prix-total">0.00</span> €</span>
            </div>
            <button class="btn-commander" onclick="validerCommande()">VALIDER LA COMMANDE</button>
        </div>

    </div>

    <script>
        let panier = [];
        let total = 0;
        let evenementInstallation;

        function ajouterAuPanier(nom, prix) {
            document.getElementById("panier-vide").style.display = "none";
            panier.push({ nom: nom, prix: prix });
            total += prix;
            document.getElementById("prix-total").innerText = total.toFixed(2);

            const liste = document.getElementById("liste-items");
            const li = document.createElement("li");
            li.classList.add("item-panier");
            li.innerHTML = `<span>${nom}</span> <b>${prix.toFixed(2)} €</b>`;
            liste.appendChild(li);
        }

        function validerCommande() {
            if(panier.length === 0) {
                alert("Ton sac est vide !");
            } else {
                alert("🎉 Commande validée pour un total de " + total.toFixed(2) + " € !");
                panier = [];
                total = 0;
                document.getElementById("prix-total").innerText = "0.00";
                document.getElementById("liste-items").innerHTML = '<p style="color: #666; text-align: center; margin-top: 20px;" id="panier-vide">Ton sac est vide...</p>';
            }
        }

        // --- GESTION DE L'INSTALLATION PC ---
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            evenementInstallation = e;
            // Afficher le bouton d'installation blanc dans le header
            document.getElementById('btn-installer-app').style.display = 'inline-block';
        });

        document.getElementById('btn-installer-app').addEventListener('click', async () => {
            if (evenementInstallation) {
                evenementInstallation.prompt();
                const { outcome } = await evenementInstallation.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('btn-installer-app').style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
