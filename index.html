<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Liste de Fournitures Scolaires ✏️</title>
  <style>
    :root {
      --primary: #ff4757;
      --secondary: #2ed573;
      --accent: #ffa502;
      --purple: #5352ed;
      --bg: #f1f2f6;
      --card-bg: #ffffff;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #70a1ff 0%, #eccc68 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-card {
      background: var(--card-bg);
      width: 100%;
      max-width: 500px;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: var(--purple);
      margin-top: 0;
      font-size: 26px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #2f3542;
    }

    input[type="text"], select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #dfe4ea;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus, select:focus {
      border-color: var(--purple);
    }

    .btn-generate {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary) 0%, #ff6b81 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
      transition: transform 0.2s;
    }

    .btn-generate:hover {
      transform: translateY(-2px);
    }

    /* Zone de la liste */
    .list-section {
      display: none;
      margin-top: 25px;
      border-top: 2px dashed #dfe4ea;
      padding-top: 20px;
      animation: fadeIn 0.4s ease-in-out;
    }

    .user-badge {
      background: #eccc68;
      color: #2f3542;
      padding: 10px 15px;
      border-radius: 12px;
      font-weight: bold;
      margin-bottom: 15px;
      text-align: center;
    }

    /* Ajout manuel d'articles */
    .add-item-box {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }

    .btn-add {
      background: var(--secondary);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Items de la liste */
    .items-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .item-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 15px;
      border-radius: 12px;
      background: #f1f2f6;
      transition: all 0.2s;
    }

    .item-card.checked {
      background: #dcdde1;
      text-decoration: line-through;
      opacity: 0.6;
    }

    .item-card input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .item-title {
      font-size: 16px;
      font-weight: 600;
      color: #2f3542;
      flex: 1;
      margin-left: 12px;
    }

    /* Couleurs pour les différentes catégories */
    .tag-cahier { border-left: 6px solid #ff4757; }
    .tag-ecriture { border-left: 6px solid #2ed573; }
    .tag-dessin { border-left: 6px solid #ffa502; }
    .tag-autre { border-left: 6px solid #5352ed; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="app-card">
    <h1>📚 Ma Liste Scolaire</h1>

    <!-- Formulaire Utilisateur -->
    <div class="form-group">
      <label for="nom">Nom :</label>
      <input type="text" id="nom" placeholder="Ex: Boukeroui">
    </div>

    <div class="form-group">
      <label for="prenom">Prénom :</label>
      <input type="text" id="prenom" placeholder="Ex: Ali">
    </div>

    <div class="form-group">
      <label for="annee">Année Scolaire :</label>
      <select id="annee">
        <option value="">-- Choisis ton niveau --</option>
        <option value="Primaire">Primaire</option>
        <option value="Moyen (CEM)">Moyen (CEM)</option>
        <option value="Lycée">Lycée</option>
      </select>
    </div>

    <button class="btn-generate" onclick="creerMaListe()">🎨 Générer Ma Liste</button>

    <!-- Zone d'affichage de la Liste -->
    <div class="list-section" id="listSection">
      <div class="user-badge" id="userBadge"></div>

      <!-- Ajouter une fourniture personnelle -->
      <div class="add-item-box">
        <input type="text" id="newItemInput" placeholder="Ajouter une affaire (ex: Trousse)...">
        <button class="btn-add" onclick="ajouterArticle()">+</button>
      </div>

      <div class="items-container" id="itemsContainer">
        <!-- Les affaires s'affichent ici -->
      </div>
    </div>
  </div>

  <script>
    // Listes de fournitures prédéfinies selon le niveau
    const basesFournitures = {
      "Primaire": [
        { nom: "Cahiers 64 pages", type: "tag-cahier" },
        { nom: "Stylos (Bleu, Rouge, Vert)", type: "tag-ecriture" },
        { nom: "Crayons de couleur & Feutres", type: "tag-dessin" },
        { nom: "Règle 20cm", type: "tag-autre" },
        { nom: "Gomme & Taille-crayon", type: "tag-autre" },
        { nom: "Bâton de Colle", type: "tag-autre" }
      ],
      "Moyen (CEM)": [
        { nom: "Cahiers 96 pages (Grands carreaux)", type: "tag-cahier" },
        { nom: "Cahier de TP (Sciences/Physique)", type: "tag-cahier" },
        { nom: "Set de géométrie (Équerre, Rapporteur, Compas)", type: "tag-autre" },
        { nom: "Stylos & Surligneurs multicolores", type: "tag-ecriture" },
        { nom: "Feuilles simples et doubles", type: "tag-cahier" },
        { nom: "Calculatrice scientifique", type: "tag-autre" }
      ],
      "Lycée": [
        { nom: "Grand Remplaçant / Classeur ou Registres", type: "tag-cahier" },
        { nom: "Stylos, Porte-mine & Effaceur", type: "tag-ecriture" },
        { nom: "Surligneurs fluorescents", type: "tag-ecriture" },
        { nom: "Calculatrice scientifique avancée", type: "tag-autre" },
        { nom: "Feuilles perforées A4", type: "tag-cahier" }
      ]
    };

    function creerMaListe() {
      const nom = document.getElementById('nom').value.trim();
      const prenom = document.getElementById('prenom').value.trim();
      const annee = document.getElementById('annee').value;
      const listSection = document.getElementById('listSection');
      const userBadge = document.getElementById('userBadge');
      const container = document.getElementById('itemsContainer');

      if (!nom || !prenom || !annee) {
        alert("⚠️ N'oublie pas de remplir ton nom, prénom et choisir ton année !");
        return;
      }

      // Message de bienvenue
      userBadge.textContent = `📋 Liste de : ${prenom} ${nom.toUpperCase()} (${annee})`;
      
      // Vider la liste précédente
      container.innerHTML = "";

      // Charger les affaires de l'année sélectionnée
      const fournitures = basesFournitures[annee] || [];
      fournitures.forEach(item => {
        creerCardArticle(item.nom, item.type);
      });

      // Afficher la section
      listSection.style.display = 'block';
    }

    function creerCardArticle(nomArticle, classeTag) {
      const container = document.getElementById('itemsContainer');

      const card = document.createElement('div');
      card.className = `item-card ${classeTag}`;

      card.innerHTML = `
        <input type="checkbox" onchange="toggleCheck(this)">
        <span class="item-title">${nomArticle}</span>
      `;

      container.appendChild(card);
    }

    function toggleCheck(checkbox) {
      const card = checkbox.parentElement;
      if (checkbox.checked) {
        card.classList.add('checked');
      } else {
        card.classList.remove('checked');
      }
    }

    function ajouterArticle() {
      const input = document.getElementById('newItemInput');
      const texte = input.value.trim();

      if (texte !== "") {
        creerCardArticle(texte, "tag-autre");
        input.value = ""; // Vider le champ d'écriture
      }
    }
  </script>

</body>
</html>
